services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - hf_cache:/root/.cache/huggingface
      - index_data:/app/index
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 120s   # first start downloads models + builds index

  ui:
    build: .
    command: sh -c "streamlit run ui/app.py --server.port 8501 --server.address 0.0.0.0"
    environment:
      - RAG_API_URL=http://api:8000
    ports:
      - "8501:8501"
    depends_on:
      api:
        condition: service_healthy

volumes:
  hf_cache:
  index_data:
